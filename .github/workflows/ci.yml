# =============================================================================
# ZabbixPilot — CI Pipeline
# Runs on every push and PR to main
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Test environment
  DATABASE_URL: postgresql://zabbixpilot:testpass@localhost:5432/zabbixpilot_test
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: ci_test_jwt_secret_minimum_32_chars_long_xxxxxxx
  JWT_REFRESH_SECRET: ci_test_refresh_secret_minimum_32_chars_long_xxx
  ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
  JWT_ACCESS_EXPIRES_IN: 15m
  JWT_REFRESH_EXPIRES_IN: 30d
  PORT: 3001
  NODE_ENV: test
  CORS_ORIGIN: http://localhost:5173
  PROVISIONING_CONCURRENCY: 2

jobs:
  # ---------------------------------------------------------------------------
  # Lint + Typecheck (fast, no services needed)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

  # ---------------------------------------------------------------------------
  # Unit & Integration Tests
  # ---------------------------------------------------------------------------
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: zabbixpilot_test
          POSTGRES_USER: zabbixpilot
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zabbixpilot -d zabbixpilot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=apps/api/prisma/schema.prisma

      - name: Run database migrations
        run: npx prisma migrate deploy --schema=apps/api/prisma/schema.prisma

      - name: Run API tests
        run: npx vitest run --reporter=verbose
        working-directory: apps/api

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Frontend build check
  # ---------------------------------------------------------------------------
  test-web:
    name: Web Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: npx turbo build --filter=@zabbixpilot/shared-types --filter=@zabbixpilot/ui --filter=@zabbixpilot/zabbix-schema

      - name: Build web app
        run: npx turbo build --filter=@zabbixpilot/web

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/
          retention-days: 3

  # ---------------------------------------------------------------------------
  # Docker build verification
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-api, test-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: false
          tags: zabbixpilot-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/web.Dockerfile
          push: false
          tags: zabbixpilot-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Security audit
  # ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high || true

      - name: Check for secrets in code
        run: |
          # Simple check for common secret patterns
          if grep -rn "password\s*=\s*['\"][^'\"]*['\"]" apps/ packages/ --include="*.ts" --include="*.tsx" | grep -v "test\." | grep -v "schema\." | grep -v ".example" | grep -v "type:" | head -5; then
            echo "::warning::Potential hardcoded secrets found. Review the lines above."
          fi
