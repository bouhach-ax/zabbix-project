services:
  postgres:
    image: postgres:16-alpine
    container_name: zabbixpilot-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zabbixpilot}
      POSTGRES_USER: ${POSTGRES_USER:-zabbixpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-zabbixpilot}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  redis:
    image: redis:7-alpine
    container_name: zabbixpilot-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    container_name: zabbixpilot-api
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-zabbixpilot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-zabbixpilot}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET required}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY required}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://zabbixpilot.example.com}
      PROVISIONING_CONCURRENCY: ${PROVISIONING_CONCURRENCY:-10}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks: [internal]

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    container_name: zabbixpilot-web
    restart: always
    depends_on: [api]
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8080/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [internal]

  nginx:
    image: nginx:1.27-alpine
    container_name: zabbixpilot-nginx
    restart: always
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_healthy }
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:80/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [internal]

volumes:
  postgres_data:
  redis_data:

networks:
  internal:
    driver: bridge
