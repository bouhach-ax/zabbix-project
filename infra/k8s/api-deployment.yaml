apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbixpilot-api
  namespace: zabbixpilot
  labels:
    app.kubernetes.io/name: zabbixpilot-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: zabbixpilot-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zabbixpilot-api
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/zabbixpilot-api:latest
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - secretRef:
                name: zabbixpilot-secrets
            - configMapRef:
                name: zabbixpilot-config
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: zabbixpilot-api
  namespace: zabbixpilot
spec:
  selector:
    app.kubernetes.io/name: zabbixpilot-api
  ports:
    - port: 3000
      targetPort: http
      name: http
  type: ClusterIP
