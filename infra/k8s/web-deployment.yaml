apiVersion: apps/v1
kind: Deployment
metadata:
  name: zabbixpilot-web
  namespace: zabbixpilot
  labels:
    app.kubernetes.io/name: zabbixpilot-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: zabbixpilot-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zabbixpilot-web
    spec:
      containers:
        - name: web
          image: ghcr.io/OWNER/zabbixpilot-web:latest
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: zabbixpilot-web
  namespace: zabbixpilot
spec:
  selector:
    app.kubernetes.io/name: zabbixpilot-web
  ports:
    - port: 8080
      targetPort: http
  type: ClusterIP
